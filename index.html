<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --white: #ffffff;
    --bg: #f0f2f5;
    --sidebar: #ffffff;
    --topbar: #ffffff;
    --accent: #7c5cfc;
    --accent-light: #ede9ff;
    --text: #1a1a2e;
    --muted: #8892a4;
    --border: #e4e7ed;
    --danger: #ff4d6d;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* TOP BAR */
  #topbar {
    height: 56px;
    background: var(--topbar);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    box-shadow: var(--shadow);
    z-index: 100;
    flex-shrink: 0;
  }

  #app-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-right: 8px;
  }

  .top-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 4px;
  }

  .top-btn {
    height: 34px;
    padding: 0 14px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .top-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--accent); }
  .top-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .top-btn.primary:hover { background: #6a4de0; }
  .top-btn.danger { color: var(--danger); }
  .top-btn.danger:hover { border-color: var(--danger); background: #fff0f3; }

  #canvas-size-label {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  /* LAYOUT */
  #workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT SIDEBAR */
  #sidebar {
    width: 220px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .tool-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .tool-btn {
    height: 52px;
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .tool-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .tool-btn .icon { font-size: 20px; }

  .shape-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .shape-btn {
    aspect-ratio: 1;
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .shape-btn:hover { border-color: var(--accent); background: var(--accent-light); }

  .color-palette {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .color-swatch {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: var(--text); }

  #custom-color {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 2px dashed var(--muted);
    cursor: pointer;
    background: none;
    padding: 0;
  }

  /* RIGHT PANEL */
  #properties {
    width: 210px;
    background: var(--sidebar);
    border-left: 1px solid var(--border);
    flex-shrink: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .prop-section {
    padding: 14px 12px 10px;
    border-bottom: 1px solid var(--border);
  }

  .prop-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 6px;
  }

  .prop-label {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .prop-input {
    width: 90px;
    height: 30px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 0 8px;
    font-size: 12px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    text-align: right;
  }
  .prop-input:focus { border-color: var(--accent); }

  .prop-input-full {
    width: 100%;
    height: 30px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 0 8px;
    font-size: 12px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    margin-bottom: 8px;
  }
  .prop-input-full:focus { border-color: var(--accent); }

  select.prop-input-full {
    cursor: pointer;
  }

  .prop-color {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    padding: 2px;
  }

  .layer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.1s;
  }
  .layer-item:hover { background: var(--bg); }
  .layer-item.selected { background: var(--accent-light); color: var(--accent); font-weight: 600; }

  .layer-icon { font-size: 14px; }

  .no-selection {
    padding: 20px 12px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }

  /* CANVAS AREA */
  #canvas-area {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #d8dce6;
    background-image: radial-gradient(circle, #c4c8d4 1px, transparent 1px);
    background-size: 20px 20px;
    padding: 40px;
  }

  #canvas-wrapper {
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }

  #main-canvas {
    display: block;
    cursor: default;
  }

  /* ZOOM */
  #zoom-controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 20px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow);
    font-size: 13px;
    font-weight: 500;
    z-index: 50;
  }
  #zoom-controls button {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  #zoom-controls button:hover { background: var(--bg); }

  /* CONTEXT MENU */
  #context-menu {
    position: fixed;
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    padding: 6px;
    z-index: 1000;
    display: none;
    min-width: 150px;
  }
  .ctx-item {
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctx-item:hover { background: var(--bg); }
  .ctx-item.danger { color: var(--danger); }
  .ctx-item.danger:hover { background: #fff0f3; }
  .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* MODAL */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: white;
    border-radius: 14px;
    padding: 24px;
    width: 320px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  #modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal-row { margin-bottom: 12px; }
  .modal-row label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  .modal-row input, .modal-row select {
    width: 100%;
    height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0 10px;
    font-size: 13px;
    outline: none;
  }
  .modal-row input:focus, .modal-row select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions button {
    flex: 1; height: 36px; border-radius: 8px;
    border: 1.5px solid var(--border);
    font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .modal-actions .btn-confirm { background: var(--accent); color: white; border-color: var(--accent); }

  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1a2e;
    color: white;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span id="app-name">✦ Studio</span>
  <div class="top-divider"></div>
  <button class="top-btn" onclick="newCanvas()">＋ New</button>
  <button class="top-btn" onclick="openCanvasSettings()">⚙ Canvas</button>
  <button class="top-btn" onclick="undo()">↩ Undo</button>
  <button class="top-btn" onclick="redo()">↪ Redo</button>
  <div class="top-divider"></div>
  <button class="top-btn" onclick="deleteSelected()" class="danger">🗑 Delete</button>
  <div class="top-divider"></div>
  <button class="top-btn primary" onclick="showExportModal()">⬇ Export</button>
  <span id="canvas-size-label">800 × 600 px</span>
</div>

<div id="workspace">

  <!-- LEFT SIDEBAR -->
  <div id="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Tools</div>
      <div class="tool-grid">
        <div class="tool-btn active" id="tool-select" onclick="setTool('select')">
          <span class="icon">↖</span> Select
        </div>
        <div class="tool-btn" id="tool-text" onclick="setTool('text')">
          <span class="icon">T</span> Text
        </div>
        <div class="tool-btn" id="tool-image" onclick="triggerImageUpload()">
          <span class="icon">🖼</span> Image
        </div>
        <div class="tool-btn" id="tool-draw" onclick="setTool('draw')">
          <span class="icon">✏</span> Draw
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Shapes</div>
      <div class="shape-grid">
        <div class="shape-btn" onclick="addShape('rect')" title="Rectangle">▭</div>
        <div class="shape-btn" onclick="addShape('circle')" title="Circle">○</div>
        <div class="shape-btn" onclick="addShape('triangle')" title="Triangle">△</div>
        <div class="shape-btn" onclick="addShape('line')" title="Line">╱</div>
        <div class="shape-btn" onclick="addShape('star')" title="Star">★</div>
        <div class="shape-btn" onclick="addShape('arrow')" title="Arrow">→</div>
        <div class="shape-btn" onclick="addShape('heart')" title="Heart">♥</div>
        <div class="shape-btn" onclick="addShape('diamond')" title="Diamond">◆</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Fill Color</div>
      <div class="color-palette" id="color-palette">
        <div class="color-swatch active" style="background:#7c5cfc" data-color="#7c5cfc" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#ff4d6d" data-color="#ff4d6d" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#ff9f1c" data-color="#ff9f1c" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#2ec4b6" data-color="#2ec4b6" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#3a86ff" data-color="#3a86ff" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#06d6a0" data-color="#06d6a0" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#1a1a2e" data-color="#1a1a2e" onclick="selectColor(this)"></div>
        <div class="color-swatch" style="background:#ffffff;border:1.5px solid #e4e7ed" data-color="#ffffff" onclick="selectColor(this)"></div>
        <input type="color" id="custom-color" title="Custom color" onchange="selectCustomColor(this.value)">
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Layers</div>
      <div id="layers-list"></div>
    </div>

  </div>

  <!-- CANVAS AREA -->
  <div id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="main-canvas"></canvas>
    </div>
  </div>

  <!-- RIGHT PROPERTIES -->
  <div id="properties">
    <div class="prop-section">
      <div class="sidebar-label">Properties</div>
      <div id="prop-content">
        <div class="no-selection">Select an element to edit its properties</div>
      </div>
    </div>
    <div class="prop-section">
      <div class="sidebar-label">Canvas Background</div>
      <div class="prop-row">
        <span class="prop-label">Color</span>
        <input type="color" class="prop-color" id="bg-color-input" value="#ffffff" onchange="changeBackground(this.value)">
      </div>
    </div>
  </div>

</div>

<!-- ZOOM CONTROLS -->
<div id="zoom-controls">
  <button onclick="zoomOut()">−</button>
  <span id="zoom-label">100%</span>
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomReset()" style="font-size:11px;width:auto;padding:0 6px;">Fit</button>
</div>

<!-- CONTEXT MENU -->
<div id="context-menu">
  <div class="ctx-item" onclick="ctxDuplicate()">⧉ Duplicate</div>
  <div class="ctx-item" onclick="ctxBringFront()">⬆ Bring to Front</div>
  <div class="ctx-item" onclick="ctxSendBack()">⬇ Send to Back</div>
  <div class="ctx-divider"></div>
  <div class="ctx-item danger" onclick="deleteSelected()">🗑 Delete</div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Export Design</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<!-- HIDDEN IMAGE INPUT -->
<input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)">

<div id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

let W = 800, H = 600;
let zoom = 1;
let elements = [];
let selected = null;
let tool = 'select';
let currentColor = '#7c5cfc';
let bgColor = '#ffffff';
let history = [];
let redoStack = [];
let idCounter = 0;

// Drag state
let isDragging = false;
let isResizing = false;
let dragStart = { x: 0, y: 0 };
let dragOffsets = { x: 0, y: 0 };
let resizeHandle = null;

// Draw state
let isDrawing = false;
let drawPath = [];

// ============================================================
// INIT
// ============================================================
function init() {
  canvas.width = W;
  canvas.height = H;
  render();
  updateLayersList();
  document.getElementById('canvas-size-label').textContent = `${W} × ${H} px`;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  elements.forEach(el => {
    ctx.save();
    if (el.type === 'rect') drawRect(el);
    else if (el.type === 'circle') drawCircle(el);
    else if (el.type === 'triangle') drawTriangle(el);
    else if (el.type === 'line') drawLine(el);
    else if (el.type === 'star') drawStar(el);
    else if (el.type === 'arrow') drawArrow(el);
    else if (el.type === 'heart') drawHeart(el);
    else if (el.type === 'diamond') drawDiamond(el);
    else if (el.type === 'text') drawText(el);
    else if (el.type === 'image') drawImage(el);
    else if (el.type === 'drawing') drawFreehand(el);
    ctx.restore();

    if (el === selected) drawSelectionBox(el);
  });

  // live freehand
  if (isDrawing && drawPath.length > 1) {
    ctx.beginPath();
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.moveTo(drawPath[0].x, drawPath[0].y);
    drawPath.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
  }
}

function drawRect(el) {
  ctx.fillStyle = el.fill;
  ctx.globalAlpha = el.opacity ?? 1;
  ctx.beginPath();
  ctx.roundRect(el.x, el.y, el.w, el.h, el.radius ?? 0);
  ctx.fill();
  if (el.stroke) { ctx.strokeStyle = el.stroke; ctx.lineWidth = el.strokeWidth ?? 2; ctx.stroke(); }
}

function drawCircle(el) {
  ctx.fillStyle = el.fill;
  ctx.globalAlpha = el.opacity ?? 1;
  ctx.beginPath();
  ctx.ellipse(el.x + el.w/2, el.y + el.h/2, el.w/2, el.h/2, 0, 0, Math.PI*2);
  ctx.fill();
  if (el.stroke) { ctx.strokeStyle = el.stroke; ctx.lineWidth = el.strokeWidth ?? 2; ctx.stroke(); }
}

function drawTriangle(el) {
  ctx.fillStyle = el.fill;
  ctx.globalAlpha = el.opacity ?? 1;
  ctx.beginPath();
  ctx.moveTo(el.x + el.w/2, el.y);
  ctx.lineTo(el.x + el.w, el.y + el.h);
  ctx.lineTo(el.x, el.y + el.h);
  ctx.closePath();
  ctx.fill();
}

function drawLine(el) {
  ctx.strokeStyle = el.fill;
  ctx.lineWidth = el.strokeWidth ?? 3;
  ctx.globalAlpha = el.opacity ?? 1;
  ctx.beginPath();
  ctx.moveTo(el.x, el.y + el.h/2);
  ctx.lineTo(el.x + el.w, el.y + el.h/2);
  ctx.stroke();
}

function drawStar(el) {
  ctx.fillStyle = el.fill;
  ctx.globalAlpha = el.opacity ?? 1;
  const cx = el.x + el.w/2, cy = el.y + el.h/2;
  const or = Math.min(el.w, el.h)/2, ir = or * 0.4;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const r = i % 2 === 0 ? or : ir;
    const a = (i * Math.PI/5) - Math.PI/2;
    i === 0 ? ctx.moveTo(cx + r*Math.cos(a), cy + r*Math.sin(a))
             : ctx.lineTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

function drawArrow(el) {
  ctx.fillStyle = el.fill;
  ctx.globalAlpha = el.opacity ?? 1;
  const x = el.x, y = el.y + el.h/2, ex = el.x + el.w;
  const hw = Math.min(el.h * 0.5, 20), hl = Math.min(el.w * 0.3, 30);
  ctx.beginPath();
  ctx.moveTo(x, y - el.h*0.12);
  ctx.lineTo(ex - hl, y - el.h*0.12);
  ctx.lineTo(ex - hl, y - hw/2);
  ctx.lineTo(ex, y);
  ctx.lineTo(ex - hl, y + hw/2);
  ctx.lineTo(ex - hl, y + el.h*0.12);
  ctx.lineTo(x, y + el.h*0.12);
  ctx.closePath(); ctx.fill();
}

function drawHeart(el) {
  ctx.fillStyle = el.fill;
  ctx.globalAlpha = el.opacity ?? 1;
  const cx = el.x + el.w/2, cy = el.y + el.h/2;
  const s = Math.min(el.w, el.h) / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy + s * 0.8);
  ctx.bezierCurveTo(cx - s*1.2, cy + s*0.2, cx - s*1.4, cy - s*0.6, cx, cy - s*0.2);
  ctx.bezierCurveTo(cx + s*1.4, cy - s*0.6, cx + s*1.2, cy + s*0.2, cx, cy + s*0.8);
  ctx.fill();
}

function drawDiamond(el) {
  ctx.fillStyle = el.fill;
  ctx.globalAlpha = el.opacity ?? 1;
  const cx = el.x + el.w/2, cy = el.y + el.h/2;
  ctx.beginPath();
  ctx.moveTo(cx, el.y);
  ctx.lineTo(el.x + el.w, cy);
  ctx.lineTo(cx, el.y + el.h);
  ctx.lineTo(el.x, cy);
  ctx.closePath(); ctx.fill();
}

function drawText(el) {
  ctx.globalAlpha = el.opacity ?? 1;
  ctx.fillStyle = el.fill;
  ctx.font = `${el.fontStyle ?? ''} ${el.fontWeight ?? 'normal'} ${el.fontSize ?? 24}px ${el.fontFamily ?? 'Segoe UI'}`;
  ctx.textAlign = el.align ?? 'left';
  ctx.textBaseline = 'top';
  const lines = el.text.split('\n');
  const lh = (el.fontSize ?? 24) * 1.3;
  lines.forEach((line, i) => {
    const tx = el.align === 'center' ? el.x + el.w/2 : el.align === 'right' ? el.x + el.w : el.x;
    ctx.fillText(line, tx, el.y + i * lh);
  });
  // Update w/h for text
  ctx.textAlign = 'left';
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
  el.w = Math.max(maxW + 10, 40);
  el.h = lines.length * lh + 4;
}

function drawImage(el) {
  if (el.imgObj) {
    ctx.globalAlpha = el.opacity ?? 1;
    ctx.drawImage(el.imgObj, el.x, el.y, el.w, el.h);
  }
}

function drawFreehand(el) {
  if (!el.points || el.points.length < 2) return;
  ctx.strokeStyle = el.fill;
  ctx.lineWidth = el.lineWidth ?? 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalAlpha = el.opacity ?? 1;
  ctx.beginPath();
  ctx.moveTo(el.points[0].x, el.points[0].y);
  el.points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.stroke();
}

function drawSelectionBox(el) {
  ctx.save();
  ctx.strokeStyle = '#7c5cfc';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 3]);
  const pad = 4;
  ctx.strokeRect(el.x - pad, el.y - pad, el.w + pad*2, el.h + pad*2);
  ctx.setLineDash([]);

  // Handles
  const handles = getHandles(el);
  handles.forEach(h => {
    ctx.fillStyle = 'white';
    ctx.strokeStyle = '#7c5cfc';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(h.x, h.y, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
  });
  ctx.restore();
}

function getHandles(el) {
  const pad = 4;
  return [
    { x: el.x - pad, y: el.y - pad, dir: 'nw' },
    { x: el.x + el.w/2, y: el.y - pad, dir: 'n' },
    { x: el.x + el.w + pad, y: el.y - pad, dir: 'ne' },
    { x: el.x + el.w + pad, y: el.y + el.h/2, dir: 'e' },
    { x: el.x + el.w + pad, y: el.y + el.h + pad, dir: 'se' },
    { x: el.x + el.w/2, y: el.y + el.h + pad, dir: 's' },
    { x: el.x - pad, y: el.y + el.h + pad, dir: 'sw' },
    { x: el.x - pad, y: el.y + el.h/2, dir: 'w' },
  ];
}

// ============================================================
// MOUSE EVENTS
// ============================================================
canvas.addEventListener('mousedown', onMouseDown);
canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('mouseup', onMouseUp);
canvas.addEventListener('dblclick', onDblClick);
canvas.addEventListener('contextmenu', onContextMenu);

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / zoom,
    y: (e.clientY - rect.top) / zoom
  };
}

function onMouseDown(e) {
  const pos = getCanvasPos(e);
  hideContextMenu();

  if (tool === 'draw') {
    isDrawing = true;
    drawPath = [pos];
    saveHistory();
    return;
  }

  if (tool === 'text') {
    addText(pos);
    setTool('select');
    return;
  }

  // Check resize handle
  if (selected) {
    const h = getHandleAt(pos, selected);
    if (h) {
      isResizing = true;
      resizeHandle = h;
      dragStart = pos;
      return;
    }
  }

  // Hit test
  const hit = hitTest(pos);
  if (hit) {
    selected = hit;
    isDragging = true;
    dragStart = pos;
    dragOffsets = { x: pos.x - hit.x, y: pos.y - hit.y };
    saveHistory();
  } else {
    selected = null;
  }
  updateProperties();
  updateLayersList();
  render();
}

function onMouseMove(e) {
  const pos = getCanvasPos(e);

  if (isDrawing) {
    drawPath.push(pos);
    render();
    return;
  }

  if (isResizing && selected) {
    resizeElement(selected, resizeHandle, pos);
    updateProperties();
    render();
    return;
  }

  if (isDragging && selected) {
    selected.x = pos.x - dragOffsets.x;
    selected.y = pos.y - dragOffsets.y;
    updateProperties();
    render();
    return;
  }

  // Cursor
  if (selected) {
    const h = getHandleAt(pos, selected);
    canvas.style.cursor = h ? getCursorForHandle(h.dir) : hitTest(pos) ? 'move' : 'default';
  } else {
    canvas.style.cursor = tool === 'text' ? 'text' : tool === 'draw' ? 'crosshair' : 'default';
  }
}

function onMouseUp(e) {
  if (isDrawing && drawPath.length > 1) {
    const xs = drawPath.map(p => p.x), ys = drawPath.map(p => p.y);
    const minX = Math.min(...xs), minY = Math.min(...ys);
    const el = {
      id: ++idCounter, type: 'drawing',
      x: minX, y: minY,
      w: Math.max(...xs) - minX || 1,
      h: Math.max(...ys) - minY || 1,
      fill: currentColor,
      lineWidth: 3,
      opacity: 1,
      points: drawPath,
      name: `Drawing ${idCounter}`
    };
    elements.push(el);
    selected = el;
  }
  isDrawing = false;
  isDragging = false;
  isResizing = false;
  resizeHandle = null;
  drawPath = [];
  updateLayersList();
  updateProperties();
  render();
}

function onDblClick(e) {
  const pos = getCanvasPos(e);
  const hit = hitTest(pos);
  if (hit && hit.type === 'text') {
    const newText = prompt('Edit text:', hit.text);
    if (newText !== null) { saveHistory(); hit.text = newText; render(); }
  }
}

function onContextMenu(e) {
  e.preventDefault();
  const pos = getCanvasPos(e);
  const hit = hitTest(pos);
  if (hit) {
    selected = hit;
    updateProperties();
    updateLayersList();
    render();
    const menu = document.getElementById('context-menu');
    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
  }
}

function hideContextMenu() {
  document.getElementById('context-menu').style.display = 'none';
}
document.addEventListener('click', hideContextMenu);

function hitTest(pos) {
  for (let i = elements.length - 1; i >= 0; i--) {
    const el = elements[i];
    const pad = 4;
    if (pos.x >= el.x - pad && pos.x <= el.x + el.w + pad &&
        pos.y >= el.y - pad && pos.y <= el.y + el.h + pad) return el;
  }
  return null;
}

function getHandleAt(pos, el) {
  return getHandles(el).find(h => Math.hypot(pos.x - h.x, pos.y - h.y) < 8) || null;
}

function getCursorForHandle(dir) {
  const map = { nw:'nw-resize', n:'n-resize', ne:'ne-resize', e:'e-resize',
                 se:'se-resize', s:'s-resize', sw:'sw-resize', w:'w-resize' };
  return map[dir] || 'default';
}

function resizeElement(el, h, pos) {
  const dx = pos.x - dragStart.x, dy = pos.y - dragStart.y;
  dragStart = pos;
  const dir = h.dir;
  if (dir.includes('e')) el.w = Math.max(20, el.w + dx);
  if (dir.includes('s')) el.h = Math.max(20, el.h + dy);
  if (dir.includes('w')) { el.x += dx; el.w = Math.max(20, el.w - dx); }
  if (dir.includes('n')) { el.y += dy; el.h = Math.max(20, el.h - dy); }
}

// ============================================================
// TOOLS & ELEMENTS
// ============================================================
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-' + t);
  if (btn) btn.classList.add('active');
  canvas.style.cursor = t === 'text' ? 'text' : t === 'draw' ? 'crosshair' : 'default';
}

function addShape(type) {
  saveHistory();
  const cx = W/2 - 60, cy = H/2 - 60;
  const el = {
    id: ++idCounter,
    type,
    x: cx + Math.random()*20 - 10,
    y: cy + Math.random()*20 - 10,
    w: 120, h: 120,
    fill: currentColor,
    opacity: 1,
    name: type.charAt(0).toUpperCase() + type.slice(1) + ' ' + idCounter
  };
  if (type === 'line') el.h = 4;
  elements.push(el);
  selected = el;
  setTool('select');
  updateLayersList();
  updateProperties();
  render();
}

function addText(pos) {
  saveHistory();
  const el = {
    id: ++idCounter,
    type: 'text',
    x: pos.x, y: pos.y,
    w: 200, h: 32,
    text: 'Double-click to edit',
    fill: currentColor,
    fontSize: 24,
    fontFamily: 'Segoe UI',
    fontWeight: 'normal',
    fontStyle: '',
    align: 'left',
    opacity: 1,
    name: 'Text ' + idCounter
  };
  elements.push(el);
  selected = el;
  updateLayersList();
  updateProperties();
  render();
}

function triggerImageUpload() {
  document.getElementById('image-input').click();
}

function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  saveHistory();
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const ratio = img.width / img.height;
      const w = Math.min(300, img.width);
      const el = {
        id: ++idCounter,
        type: 'image',
        x: W/2 - w/2, y: H/2 - (w/ratio)/2,
        w, h: w/ratio,
        fill: 'transparent',
        opacity: 1,
        imgObj: img,
        name: file.name
      };
      elements.push(el);
      selected = el;
      setTool('select');
      updateLayersList();
      updateProperties();
      render();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ============================================================
// PROPERTIES PANEL
// ============================================================
function updateProperties() {
  const panel = document.getElementById('prop-content');
  if (!selected) {
    panel.innerHTML = '<div class="no-selection">Select an element to edit its properties</div>';
    return;
  }
  const el = selected;
  let html = '';

  html += `<div class="prop-row"><span class="prop-label">X</span><input class="prop-input" type="number" value="${Math.round(el.x)}" onchange="setProp('x', +this.value)"></div>`;
  html += `<div class="prop-row"><span class="prop-label">Y</span><input class="prop-input" type="number" value="${Math.round(el.y)}" onchange="setProp('y', +this.value)"></div>`;
  html += `<div class="prop-row"><span class="prop-label">W</span><input class="prop-input" type="number" value="${Math.round(el.w)}" onchange="setProp('w', +this.value)"></div>`;
  html += `<div class="prop-row"><span class="prop-label">H</span><input class="prop-input" type="number" value="${Math.round(el.h)}" onchange="setProp('h', +this.value)"></div>`;
  html += `<div class="prop-row"><span class="prop-label">Opacity</span><input class="prop-input" type="number" min="0" max="1" step="0.1" value="${el.opacity ?? 1}" onchange="setProp('opacity', +this.value)"></div>`;

  if (el.type !== 'image') {
    html += `<div class="prop-row"><span class="prop-label">Color</span><input type="color" class="prop-color" value="${el.fill}" onchange="setProp('fill', this.value)"></div>`;
  }

  if (el.type === 'text') {
    html += `<div style="margin-top:8px"><div class="sidebar-label" style="margin-bottom:6px">Text</div>`;
    html += `<input class="prop-input-full" type="text" value="${el.text.replace(/\n/g,' ')}" onchange="setProp('text', this.value)">`;
    html += `<div class="prop-row"><span class="prop-label">Size</span><input class="prop-input" type="number" value="${el.fontSize}" onchange="setProp('fontSize', +this.value)"></div>`;
    html += `<select class="prop-input-full" onchange="setProp('fontFamily', this.value)">`;
    ['Segoe UI','Arial','Georgia','Courier New','Impact','Trebuchet MS','Verdana'].forEach(f => {
      html += `<option ${el.fontFamily===f?'selected':''}>${f}</option>`;
    });
    html += `</select>`;
    html += `<select class="prop-input-full" onchange="setProp('align', this.value)">`;
    ['left','center','right'].forEach(a => {
      html += `<option ${el.align===a?'selected':''}>${a}</option>`;
    });
    html += `</select></div>`;
  }

  if (el.type === 'rect') {
    html += `<div class="prop-row"><span class="prop-label">Radius</span><input class="prop-input" type="number" min="0" value="${el.radius ?? 0}" onchange="setProp('radius', +this.value)"></div>`;
  }

  panel.innerHTML = html;
}

function setProp(key, value) {
  if (!selected) return;
  saveHistory();
  selected[key] = value;
  render();
  updateLayersList();
}

// ============================================================
// LAYERS
// ============================================================
function updateLayersList() {
  const list = document.getElementById('layers-list');
  if (elements.length === 0) {
    list.innerHTML = '<div class="no-selection">No elements yet</div>';
    return;
  }
  list.innerHTML = [...elements].reverse().map(el => {
    const icons = { rect:'▭', circle:'○', triangle:'△', line:'╱', star:'★',
                    arrow:'→', heart:'♥', diamond:'◆', text:'T', image:'🖼', drawing:'✏' };
    return `<div class="layer-item ${el===selected?'selected':''}" onclick="selectLayer(${el.id})">
      <span class="layer-icon">${icons[el.type]||'?'}</span>
      <span>${el.name}</span>
    </div>`;
  }).join('');
}

function selectLayer(id) {
  selected = elements.find(e => e.id === id) || null;
  updateProperties();
  updateLayersList();
  render();
}

// ============================================================
// COLORS
// ============================================================
function selectColor(swatch) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  swatch.classList.add('active');
  currentColor = swatch.dataset.color;
  if (selected && selected.type !== 'image') {
    saveHistory();
    selected.fill = currentColor;
    render();
  }
}

function selectCustomColor(val) {
  currentColor = val;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  if (selected && selected.type !== 'image') {
    saveHistory();
    selected.fill = currentColor;
    render();
  }
}

function changeBackground(val) {
  saveHistory();
  bgColor = val;
  render();
}

// ============================================================
// HISTORY
// ============================================================
function saveHistory() {
  history.push(JSON.stringify(elements.map(e => ({ ...e, imgObj: undefined }))));
  if (history.length > 50) history.shift();
  redoStack = [];
}

function undo() {
  if (history.length === 0) return;
  redoStack.push(JSON.stringify(elements.map(e => ({ ...e, imgObj: undefined }))));
  restoreState(history.pop());
  showToast('Undone');
}

function redo() {
  if (redoStack.length === 0) return;
  history.push(JSON.stringify(elements.map(e => ({ ...e, imgObj: undefined }))));
  restoreState(redoStack.pop());
  showToast('Redone');
}

function restoreState(json) {
  const data = JSON.parse(json);
  elements = data;
  selected = null;
  updateLayersList();
  updateProperties();
  render();
}

// ============================================================
// CONTEXT MENU ACTIONS
// ============================================================
function ctxDuplicate() {
  if (!selected) return;
  saveHistory();
  const clone = { ...selected, id: ++idCounter, x: selected.x + 16, y: selected.y + 16,
                   name: selected.name + ' copy', imgObj: selected.imgObj };
  elements.push(clone);
  selected = clone;
  updateLayersList();
  updateProperties();
  render();
}

function ctxBringFront() {
  if (!selected) return;
  saveHistory();
  const i = elements.indexOf(selected);
  if (i < elements.length - 1) { elements.splice(i, 1); elements.push(selected); }
  render();
}

function ctxSendBack() {
  if (!selected) return;
  saveHistory();
  const i = elements.indexOf(selected);
  if (i > 0) { elements.splice(i, 1); elements.unshift(selected); }
  render();
}

function deleteSelected() {
  if (!selected) return;
  saveHistory();
  elements = elements.filter(e => e !== selected);
  selected = null;
  updateLayersList();
  updateProperties();
  render();
  showToast('Deleted');
}

// ============================================================
// ZOOM
// ============================================================
function applyZoom() {
  const wrapper = document.getElementById('canvas-wrapper');
  wrapper.style.width = (W * zoom) + 'px';
  wrapper.style.height = (H * zoom) + 'px';
  canvas.style.width = (W * zoom) + 'px';
  canvas.style.height = (H * zoom) + 'px';
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
}

function zoomIn() { zoom = Math.min(3, zoom + 0.1); applyZoom(); }
function zoomOut() { zoom = Math.max(0.2, zoom - 0.1); applyZoom(); }
function zoomReset() { zoom = 1; applyZoom(); }

// ============================================================
// EXPORT
// ============================================================
function showExportModal() {
  document.getElementById('modal-title').textContent = 'Export Design';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-row"><label>Format</label>
      <select id="export-format"><option>PNG</option><option>JPEG</option></select></div>
    <div class="modal-row"><label>Quality (JPEG)</label>
      <input type="range" id="export-quality" min="0.5" max="1" step="0.05" value="0.95"></div>
    <div class="modal-row"><label>Filename</label>
      <input type="text" id="export-filename" value="my-design"></div>
  `;
  document.getElementById('modal-confirm').textContent = 'Export';
  document.getElementById('modal-confirm').onclick = doExport;
  document.getElementById('modal-overlay').classList.add('show');
}

function doExport() {
  const fmt = document.getElementById('export-format').value;
  const quality = parseFloat(document.getElementById('export-quality').value);
  const filename = document.getElementById('export-filename').value || 'design';
  const mime = fmt === 'JPEG' ? 'image/jpeg' : 'image/png';
  const ext = fmt.toLowerCase();
  const sel = selected;
  selected = null;
  render();
  const dataURL = canvas.toDataURL(mime, quality);
  selected = sel;
  render();
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = `${filename}.${ext}`;
  a.click();
  closeModal();
  showToast(`Exported as ${filename}.${ext}`);
}

// ============================================================
// CANVAS SETTINGS
// ============================================================
function openCanvasSettings() {
  document.getElementById('modal-title').textContent = 'Canvas Size';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-row"><label>Preset</label>
      <select id="size-preset" onchange="applyPreset(this.value)">
        <option value="">Custom</option>
        <option value="800,600">800×600 — General</option>
        <option value="1080,1080">1080×1080 — Instagram Square</option>
        <option value="1080,1920">1080×1920 — Instagram Story</option>
        <option value="1920,1080">1920×1080 — Presentation / HD</option>
        <option value="595,842">595×842 — A4 Portrait</option>
        <option value="842,595">842×595 — A4 Landscape</option>
        <option value="900,300">900×300 — Banner</option>
      </select>
    </div>
    <div class="modal-row"><label>Width (px)</label><input type="number" id="canvas-w" value="${W}"></div>
    <div class="modal-row"><label>Height (px)</label><input type="number" id="canvas-h" value="${H}"></div>
  `;
  document.getElementById('modal-confirm').textContent = 'Apply';
  document.getElementById('modal-confirm').onclick = applyCanvasSize;
  document.getElementById('modal-overlay').classList.add('show');
}

function applyPreset(val) {
  if (!val) return;
  const [w, h] = val.split(',').map(Number);
  document.getElementById('canvas-w').value = w;
  document.getElementById('canvas-h').value = h;
}

function applyCanvasSize() {
  const nw = parseInt(document.getElementById('canvas-w').value);
  const nh = parseInt(document.getElementById('canvas-h').value);
  if (nw > 0 && nh > 0) {
    W = nw; H = nh;
    canvas.width = W; canvas.height = H;
    document.getElementById('canvas-size-label').textContent = `${W} × ${H} px`;
    applyZoom();
    render();
    closeModal();
    showToast(`Canvas set to ${W}×${H}`);
  }
}

function newCanvas() {
  if (elements.length > 0 && !confirm('Start a new canvas? Current design will be lost.')) return;
  saveHistory();
  elements = [];
  selected = null;
  bgColor = '#ffffff';
  document.getElementById('bg-color-input').value = '#ffffff';
  updateLayersList();
  updateProperties();
  render();
  showToast('New canvas created');
}

// ============================================================
// MODAL
// ============================================================
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') { e.preventDefault(); redo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); ctxDuplicate(); }
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.key === 'Escape') { selected = null; updateProperties(); updateLayersList(); render(); }
  if (e.key === 'ArrowLeft' && selected) { selected.x -= e.shiftKey ? 10 : 1; render(); }
  if (e.key === 'ArrowRight' && selected) { selected.x += e.shiftKey ? 10 : 1; render(); }
  if (e.key === 'ArrowUp' && selected) { selected.y -= e.shiftKey ? 10 : 1; render(); }
  if (e.key === 'ArrowDown' && selected) { selected.y += e.shiftKey ? 10 : 1; render(); }
});

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// START
// ============================================================
init();
applyZoom();
</script>
